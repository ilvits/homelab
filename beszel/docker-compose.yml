# =============================================================================
# Beszel — server and container resource monitoring
# =============================================================================

services:

  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - /mnt/user/appdata/beszel:/beszel_data
    environment:
      - TZ=Europe/Moscow

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

      # Unraid array disks
      - /mnt/disk1/.beszel:/extra-filesystems/sdX__disk1:ro
      - /mnt/disk2/.beszel:/extra-filesystems/sdY__disk2:ro
      - /mnt/disk3/.beszel:/extra-filesystems/sdZ__disk3:ro
      - /mnt/disk4/.beszel:/extra-filesystems/sdA__disk4:ro
      - /mnt/disk5/.beszel:/extra-filesystems/sdB__disk5:ro
      - /mnt/disk6/.beszel:/extra-filesystems/sdC__disk6:ro

      # Cache pools and additional disks
      - /mnt/cache/.beszel:/extra-filesystems/nvme0n1p1__cache:ro
      - /mnt/cacheb/.beszel:/extra-filesystems/sde1__cacheb:ro
      - /mnt/disks/frigate_rec/.beszel:/extra-filesystems/sdc1__frigate_rec:ro
    environment:
      - TZ=${TZ}
      - HUB_URL=${BESZEL_HUB_URL}
      - KEY=${BESZEL_KEY}
      - TOKEN=${BESZEL_TOKEN}
      - LOG_LEVEL=debug
