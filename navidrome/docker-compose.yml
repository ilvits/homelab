# =============================================================================
# Navidrome — music streaming server (Spotify alternative)
# =============================================================================

services:

  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    ports:
      - "4533:4533"
    volumes:
      - /mnt/user/appdata/navidrome:/data
      - /mnt/user/mediafiles/music:/music:ro
    environment:
      - TZ=Europe/Moscow
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4533/ping >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
