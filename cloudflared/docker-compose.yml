# =============================================================================
# Cloudflare Tunnel — туннель для fairybrains.com
# =============================================================================

services:

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    environment:
      - TZ=Europe/Moscow
