services:
  icloudpd-watchdog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: icloudpd-watchdog
    restart: unless-stopped
    env_file: .env
    volumes:
      # Cookie/session directories — separate subfolder per account
      - /mnt/user/appdata/icloudpd-ilvits:/config/ilvits
      - /mnt/user/appdata/icloudpd-kate:/config/kate
      # Photo download targets
      - /mnt/user/photoLibraries/ilvits/icloud:/data/ilvits
      - /mnt/user/photoLibraries/kate/icloud:/data/kate
