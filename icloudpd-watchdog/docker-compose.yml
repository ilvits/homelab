services:
  icloudpd-watchdog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: icloudpd-watchdog
    restart: unless-stopped
    env_file: .env
    volumes:
      # bot.py is mounted directly — only docker compose restart needed after changes
      - ./bot.py:/app/bot.py
      # Cookie/session storage — separate subdirs per account
      - /mnt/user/appdata/icloudpd-ilvits:/config/ilvits
      - /mnt/user/appdata/icloudpd-kate:/config/kate
      # Photo download destinations
      - /mnt/user/photoLibraries/ilvits/icloud:/data/ilvits
      - /mnt/user/photoLibraries/kate/icloud:/data/kate