services:
  ntfy:
    container_name: ntfy
    image: binwiederhier/ntfy:v2.18.0
    command: serve
    restart: unless-stopped
    user: "99:100"
    volumes:
      - /mnt/user/appdata/ntfy:/var/cache/ntfy
      - /mnt/user/appdata/ntfy/server.yml:/etc/ntfy/server.yml:ro
    ports:
      - "2586:2586"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2586/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
