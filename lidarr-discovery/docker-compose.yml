# =============================================================================
# Lidarr Spotify Discovery
# =============================================================================
# Discovers new artists via Spotify Related Artists API and adds them to Lidarr.
# Runs as a one-shot container — triggered via Unraid User Scripts on a schedule.
#
# First run:
#   docker compose build
#   docker compose run --rm lidarr-discovery   # dry run first (DRY_RUN=true in .env)
# =============================================================================

services:
  lidarr-discovery:
    build: .
    container_name: lidarr-discovery
    restart: "no"
    volumes:
      - /mnt/user/appdata/lidarr-discovery/data:/app/data
    env_file:
      - .env
