# =============================================================================
# Immich — self-hosted photo/video backup (Google Photos alternative)
# =============================================================================

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    user: "99:100"        # UID 99 (nobody), GID 100 (users)
    ports:
      - "8077:2283"
    devices:
      - /dev/dri:/dev/dri              # Intel Quick Sync / iGPU
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - ${EXTERNAL_LOCATION}:/mnt/external
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      - IMMICH_MACHINE_LEARNING_TIMEOUT=120000   # 120 000 ms = 120 s
      - CLIP_ENCODING_CONCURRENCY=1
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false
    networks:
      - immich

  immich-machine-learning:
    container_name: immich_ml
    user: "99:100"        # UID 99 (nobody), GID 100 (users)
    # OpenVINO image variant -> iGPU hardware acceleration
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-openvino
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/user/appdata/immich_server/ml:/cache
    tmpfs:
      - /tmp:uid=99,gid=100
    env_file:
      - .env
    environment:
      - MPLCONFIGDIR=/cache/mplconfig
    restart: always
    healthcheck:
      disable: false
    networks:
      - immich

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8-bookworm@sha256:fec42f399876eb6faf9e008570597741c87ff7662a54185593e74b09ce83d177
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    restart: always
    networks:
      - immich

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    user: "99:100"        # UID 99 (nobody), GID 100 (users)
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    restart: always
    networks:
      - immich

volumes:
  model-cache:

networks:
  immich:
    driver: bridge
