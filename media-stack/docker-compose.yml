# =============================================================================
# Media Stack — Jellyfin + *arr suite
# =============================================================================
# Все сервисы в одной сети, видят общие медиа-папки.
# Медиа: /mnt/user/mediafiles/
# Конфиги: /mnt/user/appdata/<сервис>/
# =============================================================================

networks:
  media:
    name: media
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # Jellyfin — медиасервер
  # ---------------------------------------------------------------------------
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    networks:
      - media
    ports:
      - "8096:8096"
      - "8920:8920"
      - "1900:1900/udp"
      - "7359:7359/udp"
    volumes:
      - /mnt/user/appdata/jellyfin:/config
      - /mnt/user/appdata/jellyfin/cache:/cache
      - /mnt/user/mediafiles/movies:/data/movies:ro
      - /mnt/user/mediafiles/tvshows:/data/tvshows:ro
      - /mnt/user/mediafiles/mult:/cartoons:ro
    devices:
      - /dev/dri:/dev/dri
    environment:
      - TZ=Europe/Moscow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


  # ---------------------------------------------------------------------------
  # Prowlarr — индексер-менеджер
  # ---------------------------------------------------------------------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    networks:
      - media
    ports:
      - "9696:9696"
    volumes:
      - /mnt/user/appdata/prowlarr:/config
    environment:
      - PUID=99
      - PGID=100
      - TZ=Europe/Moscow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # qBittorrent — торрент-клиент
  # ---------------------------------------------------------------------------
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    networks:
      - media
    ports:
      - "8080:8080"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    volumes:
      - /mnt/user/appdata/qbittorrent:/config
      - /mnt/user/mediafiles:/mediafiles
    environment:
      - PUID=99
      - PGID=100
      - TZ=Europe/Moscow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Sonarr — сериалы
  # ---------------------------------------------------------------------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    networks:
      - media
    ports:
      - "8989:8989"
    volumes:
      - /mnt/user/appdata/sonarr:/config
      - /mnt/user/mediafiles:/mediafiles
    environment:
      - PUID=99
      - PGID=100
      - TZ=Europe/Moscow
    depends_on:
      prowlarr:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Radarr — фильмы
  # ---------------------------------------------------------------------------
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    networks:
      - media
    ports:
      - "7878:7878"
    volumes:
      - /mnt/user/appdata/radarr:/config
      - /mnt/user/mediafiles:/mediafiles
    environment:
      - PUID=99
      - PGID=100
      - TZ=Europe/Moscow
    depends_on:
      prowlarr:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Lidarr — музыка
  # ---------------------------------------------------------------------------
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    networks:
      - media
    ports:
      - "8686:8686"
    volumes:
      - /mnt/user/appdata/lidarr:/config
      - /mnt/user/mediafiles:/mediafiles
    environment:
      - PUID=99
      - PGID=100
      - TZ=Europe/Moscow
    depends_on:
      prowlarr:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8686/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Bazarr — субтитры
  # ---------------------------------------------------------------------------
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    networks:
      - media
    ports:
      - "6767:6767"
    volumes:
      - /mnt/user/appdata/bazarr:/config
      - /mnt/user/mediafiles:/mediafiles
    environment:
      - PUID=99
      - PGID=100
      - TZ=Europe/Moscow
    depends_on:
      sonarr:
        condition: service_healthy
      radarr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Flaresolverr — обход Cloudflare для Prowlarr
  # ---------------------------------------------------------------------------
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    networks:
      - media
    ports:
      - "8191:8191"
    volumes:
      - /mnt/user/appdata/flaresolverr:/config
    environment:
      - TZ=Europe/Moscow
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Jellyseerr — запросы на контент
  # ---------------------------------------------------------------------------
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    networks:
      - media
    ports:
      - "5055:5055"
    volumes:
      - /mnt/user/appdata/jellyseerr:/app/config
    environment:
      - TZ=Europe/Moscow
    depends_on:
      jellyfin:
        condition: service_healthy
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:5055/api/v1/status"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5055/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s